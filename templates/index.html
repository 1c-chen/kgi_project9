<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>主管輔導介入系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 56px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      text-align: center;
      width: 420px;
    }
    .logo { font-size: 28px; font-weight: 700; color: #003087; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 36px; }
    h2 { font-size: 16px; color: #333; margin-bottom: 16px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 2px solid #003087;
      border-radius: 8px;
      background: #fff;
      color: #003087;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover { background: #003087; color: #fff; }
    .note { font-size: 12px; color: #aaa; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">主管輔導介入系統</div>
    <h2>選擇主管帳號（Demo）</h2>
    <a class="btn" href="/roster/1">陳志明　｜　南港分部</a>
    <a class="btn" href="/roster/2">林雅惠　｜　信義分部</a>
    <div class="note">* 此為 Demo 模式，直接點選主管身份進入</div>
    <a class="btn" href="/demo" style="margin-top: 8px; border-color: #666; color: #666;">Demo 控制台</a>
  </div>
</body>
</html>
